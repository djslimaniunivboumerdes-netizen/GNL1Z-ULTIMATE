<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Équipements GNL1Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen">

    <div id="view-home" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <img src="./assets/sonatrach_logo.png" class="w-48 mb-12" alt="Sonatrach" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Sonatrach.svg/1200px-Sonatrach.svg.png'" />
        <h1 class="text-4xl font-bold text-[#FF6B00] mb-10">Équipements GNL1Z</h1>

        <div class="w-full max-w-sm space-y-4">
            <button onclick="nav('about')" class="w-full py-3 border border-[#FF6B00] rounded-lg text-[#FF6B00] font-bold text-lg hover:bg-[#FF6B00] hover:text-white transition">À propos de GNL1Z</button>
            <button onclick="nav('equip')" class="w-full py-3 border border-[#FF6B00] rounded-lg text-[#FF6B00] font-bold text-lg hover:bg-[#FF6B00] hover:text-white transition">Liste des Équipements</button>
            <button onclick="nav('dcs')" class="w-full py-3 border border-[#FF6B00] rounded-lg text-[#FF6B00] font-bold text-lg hover:bg-[#FF6B00] hover:text-white transition">Système DCS & Tags</button>
            <button class="w-full py-3 border border-gray-600 rounded-lg text-gray-400 font-bold text-lg">English</button>
        </div>
    </div>

    <div id="app-shell" class="hidden-view p-4 max-w-3xl mx-auto">
        <button onclick="nav('home')" class="text-[#FF6B00] font-bold mb-6 flex items-center text-lg">← Retour à l'accueil</button>

        <div id="view-equip" class="hidden-view space-y-4">
            <select id="equip-select" class="w-full p-4 bg-black border border-[#FF6B00] rounded-xl text-[#FF6B00] font-bold text-lg outline-none" onchange="renderEquip()">
                </select>

            <div class="bg-black p-4 rounded-2xl border border-gray-800 mt-4">
                <h2 id="equip-title" class="text-2xl font-bold text-[#FF6B00] mb-4"></h2>
                <div id="equip-content"></div>
                <a id="equip-pdf" href="#" target="_blank" class="block mt-6 w-full bg-[#FF6B00] text-black text-center py-4 rounded-lg font-bold text-lg hover:bg-white transition">📄 OUVRIR P&ID</a>
            </div>
        </div>

        <div id="view-dcs" class="hidden-view space-y-4">
            <input type="text" id="dcs-search" placeholder="Rechercher Tag (ex: LIC-501)..." class="w-full p-4 bg-black border-2 border-[#FF6B00] rounded-xl text-white outline-none focus:border-white transition" oninput="renderDcs()" />
            <div id="dcs-results" class="grid grid-cols-1 gap-6 mt-6">
                </div>
        </div>
    </div>

    <script>
        // --- DATABASE: EXTENDED MAINTENANCE INFO ---
        const equipmentData = {
            "E-501": {
                name: "Condenseur de tête",
                info: "Type: Shell & Tube | Press: 45 Bar | Temp: -160°C",
                components: "Bundle: Stainless 316L | Gaskets: Spiral Wound Graphite",
                tools: "Hydraulic Torque Wrench (3/4\"), Flange Spreader, Gasket Scraper, Pneumatic Impact Kit",
                lifting: "Primary: 50T Mobile Crane | Slings: 4x 5m (10T each) | Spreader Bar required",
                isolation: "Lockout: Inlet/Outlet Valves V-501/502 | Blind Flange: 12\" Class 600"
            },
            "E-502": {
                name: "Rebouilleur MEA",
                info: "Thermal Duty: 15 MW | Fluid: Amine/Steam",
                components: "U-Tube Bundle | Carbon Steel Shell",
                tools: "Tube Bundle Extractor, Pressure Test Pump (200 Bar), Internal Tube Cutter",
                lifting: "A-Frame Gantry | Chain Block 10T | 2m Wire Rope Slings",
                isolation: "Double Block & Bleed | Steam Header Isolation"
            }
        };

        // --- DATABASE: PRE-INDEXED DCS TAGS ---
        const dcsIndex = [
            { file: "liquefaction-1.jpg", title: "MCR Section 500", tags: ["LIC-501", "TIC-502", "FIC-101", "XV-001", "PI-505"] },
            { file: "decarbonation-01.jpg", title: "Decarbonation Unit", tags: ["PIC-201", "LIT-204", "HV-210", "E-502"] }
        ];

        // --- LOGIC ---
        function nav(view) {
            document.getElementById('view-home').classList.add('hidden-view');
            document.getElementById('app-shell').classList.add('hidden-view');
            document.getElementById('view-equip').classList.add('hidden-view');
            document.getElementById('view-dcs').classList.add('hidden-view');

            if (view === 'home') {
                document.getElementById('view-home').classList.remove('hidden-view');
            } else if (view !== 'about') {
                document.getElementById('app-shell').classList.remove('hidden-view');
                document.getElementById('view-' + view).classList.remove('hidden-view');
                if(view === 'equip') renderEquipDropdown();
                if(view === 'dcs') renderDcs();
            } else {
                alert("Section À propos en construction.");
                document.getElementById('view-home').classList.remove('hidden-view');
            }
        }

        function renderEquipDropdown() {
            const select = document.getElementById('equip-select');
            if(select.options.length === 0) {
                for (const tag in equipmentData) {
                    const opt = document.createElement('option');
                    opt.value = tag;
                    opt.innerHTML = tag + " - " + equipmentData[tag].name;
                    select.appendChild(opt);
                }
            }
            renderEquip();
        }

        function toggleSec(secId) {
            const content = document.getElementById('sec-content-' + secId);
            const btnIcon = document.getElementById('sec-icon-' + secId);
            if (content.classList.contains('hidden-view')) {
                content.classList.remove('hidden-view');
                btnIcon.innerText = '−';
            } else {
                content.classList.add('hidden-view');
                btnIcon.innerText = '+';
            }
        }

        function renderEquip() {
            const tag = document.getElementById('equip-select').value.split(" - ")[0]; // Get tag from selection
            const data = equipmentData[tag];
            document.getElementById('equip-title').innerText = tag;
            document.getElementById('equip-pdf').href = `./pids/${tag.toLowerCase()}.pdf`;

            const sections = ["info", "components", "tools", "lifting", "isolation"];
            let html = '';
            sections.forEach((sec, index) => {
                html += `
                    <div class="mb-2 border-b border-gray-800">
                        <button onclick="toggleSec('${index}')" class="w-full py-4 flex justify-between uppercase text-xs font-bold tracking-widest text-gray-400 outline-none">
                            ${sec} <span id="sec-icon-${index}" class="text-xl font-normal leading-none">+</span>
                        </button>
                        <div id="sec-content-${index}" class="hidden-view pb-4 text-sm text-slate-300 leading-relaxed">
                            ${data[sec]}
                        </div>
                    </div>
                `;
            });
            document.getElementById('equip-content').innerHTML = html;
        }

        function renderDcs() {
            const query = document.getElementById('dcs-search').value.toLowerCase();
            const container = document.getElementById('dcs-results');
            let html = '';

            dcsIndex.forEach(d => {
                const matchTitle = d.title.toLowerCase().includes(query);
                const matchTags = d.tags.some(t => t.toLowerCase().includes(query));

                if (matchTitle || matchTags || query === "") {
                    let tagsHtml = d.tags.map(t => {
                        const isMatch = t.toLowerCase().includes(query) && query !== "";
                        const cssClass = isMatch ? "bg-[#FF6B00] text-black font-bold" : "bg-gray-800 text-gray-400";
                        return `<span class="text-[11px] px-2 py-1 rounded ${cssClass}">${t}</span>`;
                    }).join('');

                    html += `
                        <div class="bg-[#111] p-4 rounded-xl border border-gray-800 shadow-lg">
                            <h3 class="font-bold text-[#FF6B00] text-xl mb-3">${d.title}</h3>
                            <div class="flex flex-wrap gap-2 mb-4">${tagsHtml}</div>
                            <img src="./assets/${d.file}" class="w-full rounded h-48 object-cover border border-gray-700" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=\\'text-xs text-[#FF6B00] p-4 border border-dashed border-gray-700 text-center rounded\\'>[Image DCS : ./assets/${d.file} non trouvée]</div>');" />
                        </div>
                    `;
                }
            });

            if(html === '') html = '<p class="text-gray-500 italic text-center p-6">Aucun résultat trouvé pour cette recherche.</p>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
