<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNL1Z Ultimate Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [selectedTag, setSelectedTag] = useState("E-501");

            const equipment = {
                "E-501": { name: "Condenseur de tête", area: "Section 500", dcs: "liquefaction-1.jpg" },
                "E-502": { name: "Rebouilleur MEA", area: "Section 200", dcs: "decarbonation-01.jpg" },
                "X04-E-05.24": { name: "Réfrigérant MCR", area: "Section 400", dcs: "MCR-1.jpg" }
                // We can expand this list or load from your CSV later
            };

            return (
                <div className="max-w-4xl mx-auto min-h-screen p-4 pb-20">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-6 bg-blue-900 text-white p-4 rounded-2xl shadow-lg">
                        <div>
                            <h1 className="text-xl font-bold">GNL1Z ULTIMATE</h1>
                            <p className="text-xs opacity-80">Asset Integrity Management</p>
                        </div>
                        <img src="./assets/sonatrach_logo.png" className="h-10 bg-white p-1 rounded" />
                    </header>

                    {/* Selector */}
                    <div className="mb-6">
                        <select 
                            className="w-full p-4 rounded-xl border-none shadow-md text-lg font-medium"
                            value={selectedTag}
                            onChange={(e) => setSelectedTag(e.target.value)}
                        >
                            {Object.keys(equipment).map(tag => (
                                <option key={tag} value={tag}>{tag} - {equipment[tag].name}</option>
                            ))}
                        </select>
                    </div>

                    {/* Main Content Grid */}
                    <div className="grid gap-6">
                        {/* DCS Screen View */}
                        <div className="bg-white p-4 rounded-2xl shadow-md border border-slate-200">
                            <h3 className="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wider">DCS Overview</h3>
                            <img 
                                src={`./assets/${equipment[selectedTag].dcs}`} 
                                className="w-full rounded-lg shadow-inner object-cover h-48"
                                alt="DCS View"
                            />
                        </div>

                        {/* Actions */}
                        <div className="grid grid-cols-2 gap-4">
                            <a href={`./pids/${selectedTag.toLowerCase()}.pdf`} target="_blank"
                               className="bg-blue-600 text-white p-4 rounded-2xl text-center font-bold shadow-lg flex flex-col items-center justify-center">
                                <span className="text-2xl mb-1">📄</span>
                                P&ID PDF
                            </a>
                            <button className="bg-emerald-600 text-white p-4 rounded-2xl text-center font-bold shadow-lg flex flex-col items-center justify-center">
                                <span className="text-2xl mb-1">🔧</span>
                                Maintenance
                            </button>
                        </div>

                        {/* Process Map */}
                        <div className="bg-white p-4 rounded-2xl shadow-md">
                            <h3 className="text-sm font-bold text-slate-500 mb-3 uppercase">General Process Flow</h3>
                            <img src="./assets/about_gnl1z_figure.jpg" className="w-full rounded-lg" />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
