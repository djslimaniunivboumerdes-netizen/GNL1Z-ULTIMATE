<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Équipements GNL1Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [view, setView] = useState("home"); // home, equip, dcs, about
            const [selectedTag, setSelectedTag] = useState("E-501");
            const [openSection, setOpenSection] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");

            // --- DATABASE: EXTENDED MAINTENANCE INFO ---
            const equipmentData = {
                "E-501": { 
                    name: "Condenseur de tête", 
                    info: "Type: Shell & Tube | Press: 45 Bar | Temp: -160°C", 
                    components: "Bundle: Stainless 316L | Gaskets: Spiral Wound Graphite",
                    tools: "Hydraulic Torque Wrench (3/4\"), Flange Spreader, Gasket Scraper, Pneumatic Impact Kit, Caliper, Ultrasonic Thickness Gauge",
                    lifting: "Primary: 50T Mobile Crane | Slings: 4x 5m (10T each) | Shackles: 12T (Bow type) | Spreader Bar required",
                    isolation: "Lockout: Inlet/Outlet Valves V-501/502 | Blind Flange: 12\" Class 600 | Nitrogen Purge required"
                },
                "E-502": { 
                    name: "Rebouilleur MEA", 
                    info: "Thermal Duty: 15 MW | Fluid: Amine/Steam", 
                    components: "U-Tube Bundle | Carbon Steel Shell",
                    tools: "Tube Bundle Extractor, Pressure Test Pump (200 Bar), Internal Tube Cutter, Cleaning Brushes",
                    lifting: "A-Frame Gantry | Chain Block 10T | 2m Wire Rope Slings",
                    isolation: "Double Block & Bleed | Steam Header Isolation | MEA Drainage protocol"
                }
            };

            // --- DATABASE: PRE-INDEXED DCS TAGS (SIMULATED OCR RESULT) ---
            const dcsIndex = [
                { file: "liquefaction-1.jpg", title: "MCR Section 500", tags: ["LIC-501", "TIC-502", "FIC-101", "XV-001", "PI-505"] },
                { file: "decarbonation-01.jpg", title: "Decarbonation Unit", tags: ["PIC-201", "LIT-204", "HV-210", "E-502"] }
            ];

            const filteredDcs = dcsIndex.filter(d => 
                d.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase())) ||
                d.title.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // --- UI COMPONENTS ---
            if (view === "home") {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                        <img src="./assets/sonatrach_logo.png" className="w-48 mb-12" alt="Sonatrach" />
                        <h1 className="text-4xl font-bold text-[#FF6B00] mb-10">Équipements GNL1Z</h1>
                        
                        <div className="w-full max-w-sm space-y-4">
                            <button onClick={() => setView("about")} className="w-full py-3 border border-[#FF6B00] rounded-lg text-[#FF6B00] font-bold text-lg hover:bg-[#FF6B00] hover:text-white transition">À propos de GNL1Z</button>
                            <button onClick={() => setView("equip")} className="w-full py-3 border border-[#FF6B00] rounded-lg text-[#FF6B00] font-bold text-lg hover:bg-[#FF6B00] hover:text-white transition">Liste des Équipements</button>
                            <button onClick={() => setView("dcs")} className="w-full py-3 border border-[#FF6B00] rounded-lg text-[#FF6B00] font-bold text-lg hover:bg-[#FF6B00] hover:text-white transition">Système DCS & Tags</button>
                            <button className="w-full py-3 border border-gray-600 rounded-lg text-gray-400 font-bold text-lg">English</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-900 p-4">
                    <button onClick={() => setView("home")} className="text-[#FF6B00] font-bold mb-4 flex items-center">← Retour</button>
                    
                    {view === "equip" && (
                        <div className="space-y-4">
                            <select 
                                className="w-full p-4 bg-black border border-[#FF6B00] rounded-xl text-[#FF6B00] font-bold text-lg"
                                onChange={(e) => setSelectedTag(e.target.value)}
                            >
                                {Object.keys(equipmentData).map(tag => <option key={tag}>{tag}</option>)}
                            </select>

                            <div className="bg-black p-4 rounded-2xl border border-gray-800">
                                <h2 className="text-2xl font-bold text-[#FF6B00] mb-4">{selectedTag}</h2>
                                {["info", "components", "tools", "lifting", "isolation"].map(sec => (
                                    <div key={sec} className="mb-2 border-b border-gray-800">
                                        <button 
                                            onClick={() => setOpenSection(openSection === sec ? null : sec)}
                                            className="w-full py-4 flex justify-between uppercase text-xs font-bold tracking-widest text-gray-400"
                                        >
                                            {sec} <span>{openSection === sec ? "−" : "+"}</span>
                                        </button>
                                        {openSection === sec && <div className="pb-4 text-sm text-slate-300">{equipmentData[selectedTag][sec]}</div>}
                                    </div>
                                ))}
                                <a href={`./pids/${selectedTag.toLowerCase()}.pdf`} target="_blank" className="block mt-4 w-full bg-[#FF6B00] text-black text-center py-3 rounded-lg font-bold">OUVRIR P&ID</a>
                            </div>
                        </div>
                    )}

                    {view === "dcs" && (
                        <div className="space-y-4">
                            <input 
                                type="text" 
                                placeholder="Rechercher Tag (ex: LIC-501)..." 
                                className="w-full p-4 bg-black border-2 border-[#FF6B00] rounded-xl text-white outline-none"
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <div className="grid grid-cols-1 gap-4 mt-4">
                                {filteredDcs.map(d => (
                                    <div key={d.file} className="bg-black p-4 rounded-xl border border-gray-800">
                                        <h3 className="font-bold text-[#FF6B00] mb-2">{d.title}</h3>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            {d.tags.map(t => (
                                                <span key={t} className={`text-[10px] px-2 py-1 rounded ${t.toLowerCase().includes(searchQuery.toLowerCase()) && searchQuery !== "" ? "bg-[#FF6B00] text-black" : "bg-gray-800 text-gray-400"}`}>{t}</span>
                                            ))}
                                        </div>
                                        <img src={`./assets/${d.file}`} className="w-full rounded h-40 object-cover" />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
