<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNL1Z - Digital Twin (Sonatrach Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sonatrach: '#FF6B00', // The classic orange
                        industrial: '#2D3748'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [selectedTag, setSelectedTag] = useState("E-501");
            const [openSection, setOpenSection] = useState("info");

            const data = {
                "E-501": {
                    name: "Condenseur de tête",
                    dcs: "liquefaction-1.jpg",
                    info: "Type: Shell & Tube | Surface: 450m² | Fluid: MCR/NG",
                    components: "Bundle: Stainless Steel | Shell: Carbon Steel",
                    tools: "Hydraulic Torque Wrench (3/4\"), Gasket scraper",
                    lifting: "Crane: 50T | Slings: 4m Nylon | Weight: 12.5T",
                    calorifuge: "Mineral Wool 50mm | Aluminum Cladding"
                },
                "E-502": {
                    name: "Rebouilleur MEA",
                    dcs: "decarbonation-01.jpg",
                    info: "Heat source: Low Pressure Steam | Capacity: 120m3/h",
                    components: "U-Tube Bundle | Floating Head",
                    tools: "Impact Wrench (1\"), Tube cleaner",
                    lifting: "Crane: 25T | Shackles: 5T",
                    calorifuge: "Calcium Silicate 40mm"
                }
            };

            const sections = [
                { id: "info", label: "Equipment Information", icon: "ℹ️" },
                { id: "components", label: "Components", icon: "⚙️" },
                { id: "tools", label: "Tools Required", icon: "🔧" },
                { id: "lifting", label: "Lifting & Handling", icon: "🏗️" },
                { id: "calorifuge", label: "Calorifuge / Insulation", icon: "🌡️" }
            ];

            return (
                <div className="max-w-5xl mx-auto min-h-screen p-2 md:p-6">
                    {/* Header */}
                    <header className="bg-sonatrach text-white p-4 rounded-t-2xl flex justify-between items-center shadow-lg">
                        <div>
                            <h1 className="text-xl font-bold tracking-tighter italic">SONATRACH</h1>
                            <p className="text-xs uppercase font-semibold">Division Production - GNL1Z</p>
                        </div>
                        <div className="text-right">
                            <span className="text-2xl font-black opacity-20">DIGITAL TWIN</span>
                        </div>
                    </header>

                    {/* Main Interface */}
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-4 mt-4">
                        
                        {/* Sidebar: Lists */}
                        <div className="md:col-span-4 space-y-4">
                            <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-sonatrach">
                                <label className="text-xs font-bold text-gray-400 uppercase">List of Equipment</label>
                                <select 
                                    className="w-full mt-1 p-3 bg-slate-50 border rounded-lg font-bold text-industrial"
                                    value={selectedTag}
                                    onChange={(e) => setSelectedTag(e.target.value)}
                                >
                                    {Object.keys(data).map(tag => <option key={tag}>{tag}</option>)}
                                </select>
                            </div>

                            <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                                <label className="text-xs font-bold text-gray-400 uppercase">Linked DCS System</label>
                                <div className="mt-2 text-sm font-bold text-blue-700 p-2 bg-blue-50 rounded">
                                    {data[selectedTag].dcs}
                                </div>
                                <img src={`./assets/${data[selectedTag].dcs}`} className="mt-2 rounded h-32 w-full object-cover grayscale hover:grayscale-0 transition cursor-pointer" />
                            </div>
                        </div>

                        {/* Content Area: Elaborated Sections */}
                        <div className="md:col-span-8 bg-white rounded-xl shadow-sm overflow-hidden">
                            <div className="p-4 border-b bg-slate-50">
                                <h2 className="text-lg font-bold text-industrial">{selectedTag} - {data[selectedTag].name}</h2>
                            </div>
                            
                            <div className="p-4 space-y-2">
                                {sections.map(sec => (
                                    <div key={sec.id} className="border rounded-lg overflow-hidden transition-all">
                                        <button 
                                            onClick={() => setOpenSection(openSection === sec.id ? "" : sec.id)}
                                            className={`w-full flex justify-between items-center p-4 text-left font-semibold ${openSection === sec.id ? 'bg-sonatrach text-white' : 'bg-white text-industrial hover:bg-slate-50'}`}
                                        >
                                            <span>{sec.icon} {sec.label}</span>
                                            <span>{openSection === sec.id ? '−' : '+'}</span>
                                        </button>
                                        {openSection === sec.id && (
                                            <div className="p-4 bg-orange-50 text-industrial border-t animate-fade-in">
                                                <p className="leading-relaxed">{data[selectedTag][sec.id]}</p>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="p-4 bg-slate-50 border-t flex justify-center">
                                <a href={`./pids/${selectedTag.toLowerCase()}.pdf`} target="_blank" className="bg-industrial text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-black transition">
                                    View Technical P&ID
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
